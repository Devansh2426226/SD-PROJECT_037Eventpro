<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventPro | Admin Login</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1f2937, #4b5563);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: white;
            width: 100%;
            max-width: 420px;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 16px 40px rgba(0,0,0,0.25);
        }
        h1 { margin: 0 0 10px; color: #111827; font-size: 28px; }
        .note {
            background: #fef2f2;
            color: #991b1b;
            padding: 10px 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .message { padding: 10px 12px; border-radius: 10px; margin-bottom: 15px; font-size: 14px; }
        .message.danger { background: #fef2f2; color: #b91c1c; }
        .message.info { background: #eff6ff; color: #1d4ed8; }
        form { display: flex; flex-direction: column; gap: 12px; }
        label { font-weight: 600; color: #374151; }
        input { padding: 12px 14px; border: 1px solid #d1d5db; border-radius: 10px; outline: none; }
        input:focus { border-color: #8b5e3c; box-shadow: 0 0 0 3px rgba(139,94,60,0.15); }
        button { padding: 12px; border: none; border-radius: 10px; background: #8b5e3c; color: white; font-weight: 600; cursor: pointer; }
        button:hover { opacity: 0.95; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Admin Access</h1>
        <div class="note">This area is restricted for administrators only. It is not for regular users.</div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="message {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="/admin/login">
            <label for="username">Admin Username</label>
            <input id="username" type="text" name="username" placeholder="Enter username" required>

            <label for="password">Password</label>
            <input id="password" type="password" name="password" placeholder="Enter password" required>

            <button type="submit">Login as Admin</button>
        </form>
    </div>
</body>
</html>
