<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventPro - Login</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #8b5e3c, #c89b6b);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: white;
            width: 100%;
            max-width: 420px;
            padding: 35px;
            border-radius: 18px;
            box-shadow: 0 12px 35px rgba(0,0,0,0.2);
        }
        h1 { margin: 0 0 8px; color: #1f2937; font-size: 28px; }
        p { color: #6b7280; margin-bottom: 20px; }
        .message { padding: 10px 12px; border-radius: 8px; margin-bottom: 15px; font-size: 14px; }
        .message.success { background: #ecfdf3; color: #047857; }
        .message.danger { background: #fef2f2; color: #b91c1c; }
        .message.warning { background: #fffbeb; color: #b45309; }
        .message.info { background: #eff6ff; color: #1d4ed8; }
        form { display: flex; flex-direction: column; gap: 12px; }
        label { font-weight: 600; color: #374151; }
        input {
            padding: 12px 14px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            outline: none;
            font-size: 15px;
        }
        input:focus { border-color: #8b5e3c; box-shadow: 0 0 0 3px rgba(139,94,60,0.15); }
        button {
            margin-top: 8px;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #8b5e3c, #a56b3d);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover { opacity: 0.95; }
        .footer-text { text-align: center; margin-top: 16px; font-size: 14px; }
        .footer-text a { color: #8b5e3c; text-decoration: none; font-weight: 600; }
        @media (max-width: 480px) {
            body { padding: 12px; }
            .card { padding: 24px; }
            h1 { font-size: 24px; }
            button { padding: 13px; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div style="display:flex; justify-content:center; margin-bottom:16px;">
            <img src="/static/eventpro-logo.svg" alt="EventPro logo" style="height:54px; width:auto;">
        </div>
        <h1>EventPro</h1>
        <p>Welcome back! Login to continue planning your event.</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="message {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="/login" method="POST">
            <label for="email">Email</label>
            <input id="email" type="email" name="email" placeholder="Enter your email" required>

            <label for="password">Password</label>
            <input id="password" type="password" name="password" placeholder="Enter your password" required>

            <button type="submit">Login</button>
        </form>

        <p class="footer-text">Don't have an account? <a href="/register">Register Here</a></p>
    </div>
</body>
</html>
